  <style>
    .ch-page{ padding: 18px 22px 56px; }
    .ch-container{
      width: min(920px, 100%);
      margin: 0 auto;
    }
    .ch-head{
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .ch-title{
      font-size: 30px;
      font-weight: 700;
      color: #1A1A1A;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }
    .ch-head-actions{
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ch-head-btn{
      height: 30px;
      padding: 0 12px;
      border-radius: 7px;
      border: 1px solid transparent;
      font-size: 12.5px;
      color: #5A5550;
      background: #FFFFFF;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      transition: all .15s;
    }
    .ch-head-btn [data-lucide]{ width: 13px; height: 13px; }
    .ch-head-btn.ghost{ border-color:#D8D3C9; }
    .ch-head-btn.ghost:hover{ background:#F5F1EB; border-color:#CFC9BD; color:#3A3A3A; }
    .ch-head-btn.primary{
      background:#A87E2C;
      border-color:#A87E2C;
      color:#FAFAF8;
    }
    .ch-head-btn.primary:hover{ background:#8F6A22; border-color:#8F6A22; }
    .ch-head-btn.primary [data-lucide]{ color:#FAFAF8; }

    .ch-search{
      display:flex;
      align-items:center;
      gap:8px;
      width:100%;
      margin-bottom:12px;
      background:#fff;
      border:1px solid #D8D3C9;
      border-radius:8px;
      padding:8px 12px;
      transition:border-color .15s, box-shadow .15s;
    }
    .ch-search:focus-within{
      border-color:#A87E2C;
      box-shadow:0 0 0 2px rgba(168,126,44,.12);
    }
    .ch-search [data-lucide]{
      width:14px;
      height:14px;
      color:#9A968F;
      flex-shrink:0;
    }
    .ch-search input{
      width:100%;
      border:none;
      outline:none;
      background:transparent;
      font-size:12.5px;
      color:#3A3A3A;
      font-family:inherit;
    }
    .ch-search input::placeholder{ color:#B8B3AA; }

    .ch-list{
      width:100%;
      display:flex;
      flex-direction:column;
      gap:2px;
    }
    .ch-item{
      display:flex;
      align-items:center;
      gap:10px;
      width:100%;
      background:transparent;
      border:none;
      border-radius:8px;
      padding:10px 10px;
      text-align:left;
      cursor:pointer;
      transition:background .12s;
    }
    .ch-item:hover{ background:#F5F1EB; }
    .ch-item:hover .ch-item-actions{ opacity:1; }

    .ch-item-icon{
      width:28px;
      height:28px;
      border-radius:6px;
      border:1px solid #ECE9E2;
      background:#FAFAF8;
      display:grid;
      place-items:center;
      color:#A5A198;
      flex-shrink:0;
    }
    .ch-item-icon [data-lucide]{ width:13px; height:13px; }

    .ch-item-main{ min-width:0; flex:1; }
    .ch-item-title{
      font-size:12.8px;
      color:#1E1B16;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      line-height:1.4;
    }
    .ch-item-meta{
      margin-top:1px;
      display:flex;
      align-items:center;
      gap:8px;
      font-size:11px;
      color:#B8B3AA;
    }
    .ch-item-actions{
      display:flex;
      align-items:center;
      gap:2px;
      opacity:0;
      transition:opacity .12s;
      flex-shrink:0;
    }
    .ch-action{
      width:26px;
      height:26px;
      border:none;
      border-radius:6px;
      display:grid;
      place-items:center;
      background:transparent;
      color:#9A968F;
      cursor:pointer;
      transition:background .12s, color .12s;
    }
    .ch-action [data-lucide]{ width:12px; height:12px; }
    .ch-action:hover{
      background:#E8E2D8;
      color:#3A3A3A;
    }
  </style>
</head>
